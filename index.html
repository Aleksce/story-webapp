<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Story Creator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f0f0f; color: white; text-align: center; padding: 20px; font-family: sans-serif; }
        img { max-width: 100%; border-radius: 12px; margin: 20px 0; }
        button { padding: 15px 40px; font-size: 18px; background: #0088cc; color: white; border: none; border-radius: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>Готовая история</h2>
    <img id="photo" alt="story">
    <p id="caption" style="font-size: 18px; margin: 20px 0;"></p>
    
    <button onclick="shareStory()">Выложить в историю</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const photoUrl = urlParams.get('photo');
        const caption = urlParams.get('caption') || 'Моя история';

        if (photoUrl) document.getElementById('photo').src = photoUrl;
        document.getElementById('caption').innerText = caption;

        function shareStory() {
            tg.shareToStory(caption, {
                media: photoUrl
            });
        }
    </script>
</body>
</html>
