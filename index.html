<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Story Creator</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1a2e;
      color: #fff;
      padding: 20px;
      font-size: 14px;
    }
    .card { background: #16213e; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .label { color: #888; font-size: 11px; text-transform: uppercase; margin-bottom: 6px; }
    .value { word-break: break-all; font-size: 13px; color: #7dd3fc; }
    img { width: 100%; border-radius: 8px; margin-top: 8px; max-height: 200px; object-fit: cover; }
    .btn {
      background: #e94560; color: white; border: none;
      border-radius: 12px; padding: 14px; font-size: 15px;
      font-weight: 600; width: 100%; cursor: pointer; margin-top: 8px;
    }
    .btn-debug {
      background: #0f3460; color: white; border: none;
      border-radius: 12px; padding: 10px; font-size: 13px;
      width: 100%; cursor: pointer; margin-top: 8px;
    }
    .error { color: #ff6b6b; font-size: 12px; margin-top: 8px; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <div class="label">Фото URL</div>
    <div class="value" id="dbgPhoto">—</div>
    <div id="imgWrap"></div>
  </div>
  <div class="card">
    <div class="label">Подпись (caption)</div>
    <div class="value" id="dbgCaption">—</div>
  </div>
  <div class="card">
    <div class="label">Версия Telegram Web App</div>
    <div class="value" id="dbgVersion">—</div>
  </div>

  <button class="btn" onclick="shareStory()">🚀 Выложить в историю</button>
  <button class="btn-debug" onclick="copyDebug()">📋 Скопировать данные для отладки</button>
  <div id="error" class="error"></div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  // Читаем параметры — URLSearchParams уже делает decodeURIComponent
  const params = new URLSearchParams(window.location.search);
  const photoUrl = params.get("photo") || "";
  const caption  = params.get("caption") || "";
  const version  = tg.version || "неизвестно";

  // Показываем отладочную инфо
  document.getElementById("dbgPhoto").textContent   = photoUrl || "НЕТ";
  document.getElementById("dbgCaption").textContent = caption  || "НЕТ";
  document.getElementById("dbgVersion").textContent = version;

  // Предпросмотр фото
  if (photoUrl) {
    document.getElementById("imgWrap").innerHTML =
      `<img src="${photoUrl}" onerror="this.outerHTML='<div style=color:#f87>❌ Фото не загружается — проверь URL</div>'" />`;
  }

  function shareStory() {
    if (!photoUrl) {
      document.getElementById("error").textContent = "❌ Нет URL фото";
      return;
    }
    try {
      tg.shareToStory(photoUrl, {
        text: caption,
        widget_link: {
          url: "https://t.me/твой_канал",
          name: "Канал"
        }
      });
    } catch(e) {
      document.getElementById("error").textContent = "❌ Ошибка: " + e.message;
    }
  }

  function copyDebug() {
    const info = `URL страницы: ${window.location.href}\nФото: ${photoUrl}\nCaption: ${caption}\nTG версия: ${version}`;
    navigator.clipboard.writeText(info).then(() => {
      document.getElementById("error").textContent = "✅ Скопировано";
    });
  }
</script>
</body>
</html>
